<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			(function () {
				try {
					var stored = localStorage.getItem('theme');
					var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
					var isDark = stored === 'dark' || (!stored && prefersDark);
					var root = document.documentElement;
					if (isDark) root.classList.add('dark');
					// inline styles so the page paints with the right colors even before
					// CSS finishes loading (matters in vite dev where CSS is JS-injected)
					root.style.backgroundColor = isDark ? 'rgb(18, 17, 16)' : 'rgb(250, 249, 246)';
					root.style.color = isDark ? 'rgb(242, 240, 234)' : 'rgb(28, 27, 25)';
					root.style.colorScheme = isDark ? 'dark' : 'light';
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" data-sveltekit-preload-code="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
